version: '3.8'

services:
  # Servicio de la aplicación web
  app:
    build: .
    container_name: sig_ccr_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  # Servicio de persistencia (MySQL)
  db:
    image: mysql:8.0
    container_name: sig_ccr_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_segura
      MYSQL_DATABASE: sig_ccr
      MYSQL_USER: admin_db
      MYSQL_PASSWORD: user_password_segura
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # Asegura la persistencia de los datos

# Declaración del volumen nombrado
volumes:
  db_data:
